name: Daily Flight Hunt

on:
  schedule:
    # This runs every Tuesday and Thursday at 08:00 UTC
    - cron: '0 8 * * 2,4'
  workflow_dispatch:
    # This allows you to run it manually from the GitHub "Actions" tab

jobs:
  hunt:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/checkout@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Flight Hunter
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        DUFFEL_ACCESS_TOKEN: ${{ secrets.DUFFEL_ACCESS_TOKEN }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: python flight_hunter.py
